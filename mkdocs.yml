site_name: Matwerk
site_url: https://nfdi.fiz-karlsruhe.de/matwerk/
repo_url: https://github.com/ISE-FIZKarlsruhe/matwerk
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - ontoink
  - macros:
      module_name: docs/macros
      on_error_fail: true
      j2_block_start_string: '[%'
      j2_block_end_string: '%]'
      j2_variable_start_string: '[['
      j2_variable_end_string: ']]'

nav:
  - Home: index.md
  - Dashboard: https://superset.ise.fiz-karlsruhe.de/superset/dashboard/mse-kg-dashboard/
  - How to add data?: upload.md
  - SPARQL Endpoint: /matwerk/shmarql/
  - RDF Dumps: dumps.md
  - Sample Queries:
      - General Queries: general_queries.md
      - Federated Queries: Federated_queries.md
      - Statistics: statistics.md
      - Named Graphs Statistics: namedgraphsstatistics.md
  - Pipeline:
      - Overview: pipeline/index.md
      - Template Processing: pipeline/process-spreadsheets.md
      - Merge: pipeline/merge.md
      - Reasoning: pipeline/reason.md
      - Validation: pipeline/validation.md
      - Harvesters: pipeline/harvesters.md
      - Publish to Virtuoso: pipeline/publish.md
      - Dashboard DAG: pipeline/dashboard.md
      - Dump & Archive: pipeline/dump-and-archive.md
      - CQ Tester: pipeline/cq-tester.md
  - Shapes:
      - Overview: shapes/index.md
      - Textual Entity: shapes/textual-entity/pattern.md
      - No Punning: shapes/no-punning/pattern.md
      - Role Bearer: shapes/role-bearer/pattern.md
      - Role Realization: shapes/role-realization/pattern.md
      - Ontology Variant: shapes/ontology-variant/pattern.md
      - Ontology Version: shapes/ontology-version/pattern.md
      - Ontology Version (Complex): shapes/ontology-version-complex/pattern.md
      - Email Address Value: shapes/email-address/pattern.md
      - URL Instance: shapes/url-instance/pattern.md
  - Verification:
      - SPARQL Checks: verification/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      preserve_tabs: true
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - overrides/assets/stylesheets/extra.css

extra_javascript:
  - overrides/assets/javascripts/open-dashboard-link.js
  - overrides/assets/javascripts/extra.js
  - https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.min.js
