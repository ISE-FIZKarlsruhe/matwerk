site_name: Matwerk
site_url: https://nfdi.fiz-karlsruhe.de/matwerk/
repo_url: https://github.com/ISE-FIZKarlsruhe/matwerk
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - macros:
      module_name: docs/macros
      on_error_fail: true
      j2_block_start_string: '[%'
      j2_block_end_string: '%]'
      j2_variable_start_string: '[['
      j2_variable_end_string: ']]'

nav:
  - Home: index.md
  - Dashboard: https://superset.ise.fiz-karlsruhe.de/superset/dashboard/mse-kg-dashboard/
  - How to add data?: upload.md
  - SPARQL Endpoint: /matwerk/shmarql/
  - RDF Dumps: dumps.md
  - Sample Queries:
    - General Queries: general_queries.md
    - Federated Queries: Federated_queries.md
    - Statistics: statistics.md
    - Named Graphs Statistics: namedgraphsstatistics.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      preserve_tabs: true
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - overrides/assets/stylesheets/extra.css

extra_javascript:
  - overrides/assets/javascripts/open-dashboard-link.js
  - overrides/assets/javascripts/extra.js